<!DOCTYPE html>
<html>
<head>
<title>Telugu AI Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #343541;
    color: white;
}

#chat {
    height: 85vh;
    overflow-y: auto;
    padding: 15px;
}

.message {
    max-width: 75%;
    padding: 12px;
    margin: 8px;
    border-radius: 12px;
    line-height: 1.4;
}

.user {
    background: #0b93f6;
    margin-left: auto;
}

.bot {
    background: #444654;
    margin-right: auto;
}

#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    padding: 10px;
    background: #40414f;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    border: none;
    outline: none;
}

button {
    margin-left: 5px;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

/* Mobile responsive */
@media(max-width:600px){
    #chat {
        height: 80vh;
    }
}
</style>

</head>

<body>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Type or speak...">
    <button onclick="send()">Send</button>
    <button onclick="startVoice()">🎤</button>
    <button onclick="clearChat()">🗑</button>
</div>

<script>
let chat = document.getElementById("chat");

// 🔄 Load saved chat
window.onload = function() {
    let saved = localStorage.getItem("chatHistory");
    if (saved) {
        chat.innerHTML = saved;
        chat.scrollTop = chat.scrollHeight;
    }
};

// 💾 Save chat
function saveChat() {
    localStorage.setItem("chatHistory", chat.innerHTML);
}

// 🗑 Clear chat
function clearChat() {
    chat.innerHTML = "";
    localStorage.removeItem("chatHistory");
}

// 💬 Send message
async function send() {
    let message = document.getElementById("msg").value;
    if (!message) return;

    chat.innerHTML += `<div class="message user">${message}</div>`;
    document.getElementById("msg").value = "";

    let thinking = document.createElement("div");
    thinking.className = "message bot";
    thinking.innerText = "Typing...";
    chat.appendChild(thinking);

    chat.scrollTop = chat.scrollHeight;

    try {
        let res = await fetch("https://ai-chatbot.onrender.com/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: message})
        });

        let data = await res.json();

        thinking.innerText = data.reply;

        speak(data.reply);
        saveChat();

    } catch {
        thinking.innerText = "Error connecting server";
    }

    chat.scrollTop = chat.scrollHeight;
}

// 🎤 Voice input
function startVoice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "te-IN";

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById("msg").value = text;
        send();
    };

    recognition.start();
}

// 🔊 Voice output
function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "te-IN";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
